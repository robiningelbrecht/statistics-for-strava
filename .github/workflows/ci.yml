name: ci
on:
  workflow_dispatch:
  pull_request:
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true
permissions:
  pull-requests: write
jobs:
  ci:
    name: Run CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup CI environment
        uses: ./.github/actions/setup-env

      - name: Validate composer.json
        run: composer validate --strict

      - name: Validate PSR-4 compliance
        run: composer dump-autoload --dev --optimize --strict-psr

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse

      - name: Run Rector
        run: vendor/bin/rector --dry-run

      - name: Run PHPcs fixer dry-run
        run: vendor/bin/php-cs-fixer fix --dry-run --stop-on-violation --config=.php-cs-fixer.dist.php

      - name: Run test suite
        run: vendor/bin/paratest --order-by=random --fail-on-incomplete --log-junit junit.xml --coverage-clover=clover.xml

      - name: Setup Caddy
        run: |
          curl -fsSL -o caddy.tar.gz https://github.com/caddyserver/caddy/releases/download/v2.10.2/caddy_2.10.2_linux_amd64.tar.gz
          tar -xzf caddy.tar.gz caddy
          sudo install -m 0755 caddy /usr/bin/caddy
          rm caddy.tar.gz
          caddy version

      - name: Run Caddy test suite
        run: vendor/bin/paratest --testsuite caddy

      - name: Generate coverage report
        uses: clearlyip/code-coverage-report-action@v7
        id: code_coverage_report_action
        with:
          filename: 'clover.xml'
          only_list_changed_files: true
          fail_on_negative_difference: true
          artifact_download_workflow_names: 'ci,coverage-report'

      - name: Add coverage PR comment
        uses: marocchino/sticky-pull-request-comment@v3
        if: github.event.pull_request.user.login == 'robiningelbrecht' && steps.code_coverage_report_action.outputs.file != '' && github.event_name == 'pull_request' && (success() || failure())
        with:
          recreate: false
          path: code-coverage-results.md