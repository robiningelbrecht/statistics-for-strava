name: 'coverage-report'
on:
  workflow_dispatch:
  push:
    branches:
      - master
  schedule:
    - cron: '0 2 * * *'
jobs:
  coverage-artifact:
    name: Generate coverage artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup CI environment
        uses: ./.github/actions/setup-env

      - name: Run test suite
        run: vendor/bin/phpunit --order-by=random --fail-on-incomplete --log-junit junit.xml --coverage-clover=clover.xml

      - name: Generate coverage report
        uses: clearlyip/code-coverage-report-action@v7
        id: code_coverage_report_action
        with:
          filename: 'clover.xml'
          only_list_changed_files: true
          fail_on_negative_difference: true