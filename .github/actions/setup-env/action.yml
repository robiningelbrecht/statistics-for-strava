name: Setup CI environment
description: Install geos, PHP 8.5 + xdebug, Go, build fit-tool, install Composer dependencies

runs:
  using: composite
  steps:
    - name: Install geos
      run: sudo apt install -y geos-bin
      shell: bash

    # https://github.com/marketplace/actions/setup-php-action
    - name: Setup PHP 8.5
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5'
        coverage: xdebug
        extensions: zstd
        ini-values: zend.assertions=1

    # https://github.com/marketplace/actions/setup-go-environment
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache-dependency-path: docker/fit-tool/go.sum

    - name: Build fit-tool
      run: |
        CGO_ENABLED=0 go build -ldflags="-s -w" -o fit-tool .
        sudo install -m 0755 fit-tool /usr/bin/fit-tool
      working-directory: docker/fit-tool
      shell: bash

    - name: Copy .env file
      run: cp .env.test .env
      shell: bash

    - name: Get Composer cache directory
      id: composer-cache
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      shell: bash

    - name: Cache Composer dependencies
      uses: actions/cache@v5
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: ${{ runner.os }}-composer-

    - name: Install dependencies
      run: composer install --prefer-dist
      shell: bash
